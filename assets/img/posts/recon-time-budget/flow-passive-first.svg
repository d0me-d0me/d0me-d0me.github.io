<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 830" width="720" height="830" role="img" aria-labelledby="flow-title" preserveAspectRatio="xMidYMid meet">
  <title id="flow-title">Passive-first reconnaissance flow with three phases</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8F8875"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#615C50"/>
    </marker>
  </defs>

  <!-- Start -->
  <ellipse cx="360" cy="50" rx="60" ry="20" fill="none" stroke="#D9DCCF" stroke-width="1.5"/>
  <text x="360" y="55" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#F2F4EA" text-anchor="middle">Start</text>

  <!-- Start → Phase 1 -->
  <line x1="360" y1="70" x2="360" y2="88" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 1: Passive (GREEN) -->
  <rect x="80" y="90" width="560" height="130" fill="#131210" stroke="#48B44A" stroke-width="1.5" rx="4"/>
  <rect x="80" y="90" width="560" height="26" fill="#48B44A" fill-opacity="0.15" stroke="none"/>
  <text x="360" y="108" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#48B44A" text-anchor="middle" font-weight="700">Phase 1 — Passive · noise ≈ 0</text>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#D9DCCF" text-anchor="middle">
    <text x="360" y="140">crt.sh CT logs</text>
    <text x="360" y="162">Shodan / Censys / ZoomEye</text>
    <text x="360" y="184">Wayback / GitHub dorks</text>
    <text x="360" y="206">SecurityTrails DNS history</text>
  </g>

  <!-- Phase 1 → D1 -->
  <line x1="360" y1="220" x2="360" y2="238" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- D1 diamond -->
  <polygon points="360,240 430,280 360,320 290,280" fill="#131210" stroke="#D9DCCF" stroke-width="1.5"/>
  <text x="360" y="275" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#F2F4EA" text-anchor="middle">Passive coverage</text>
  <text x="360" y="290" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#F2F4EA" text-anchor="middle">sufficient?</text>

  <!-- D1 No → Phase 2 (sequential, solid) -->
  <line x1="360" y1="320" x2="360" y2="338" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="332" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#D9DCCF" text-anchor="start">No</text>

  <!-- D1 Yes → Rank (skip, dashed) -->
  <polyline points="430,280 620,280 620,700 480,700" fill="none" stroke="#615C50" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dim)"/>
  <text x="440" y="273" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#48B44A" text-anchor="start" font-weight="700">Yes (skip)</text>

  <!-- Phase 2: Low-noise active (AMBER) -->
  <rect x="80" y="340" width="560" height="105" fill="#131210" stroke="#E5A03B" stroke-width="1.5" rx="4"/>
  <rect x="80" y="340" width="560" height="26" fill="#E5A03B" fill-opacity="0.15" stroke="none"/>
  <text x="360" y="358" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#E5A03B" text-anchor="middle" font-weight="700">Phase 2 — Low-noise active</text>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#D9DCCF" text-anchor="middle">
    <text x="360" y="388">Nmap top 1000 SYN sweep</text>
    <text x="360" y="410">Subdomain wordlist 110k</text>
    <text x="360" y="432">dig + CDN triage</text>
  </g>

  <!-- Phase 2 → D2 -->
  <line x1="360" y1="445" x2="360" y2="463" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- D2 diamond -->
  <polygon points="360,465 430,505 360,545 290,505" fill="#131210" stroke="#D9DCCF" stroke-width="1.5"/>
  <text x="360" y="500" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#F2F4EA" text-anchor="middle">Interesting</text>
  <text x="360" y="515" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#F2F4EA" text-anchor="middle">responses?</text>

  <!-- D2 Yes → Phase 3 (sequential, solid) -->
  <line x1="360" y1="545" x2="360" y2="563" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="557" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#E5A03B" text-anchor="start" font-weight="700">Yes</text>

  <!-- D2 No → Rank (skip, dashed) -->
  <polyline points="430,505 600,505 600,714 480,714" fill="none" stroke="#615C50" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dim)"/>
  <text x="440" y="498" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#D9DCCF" text-anchor="start">No (skip)</text>

  <!-- Phase 3: High-noise active (RED) -->
  <rect x="80" y="565" width="560" height="105" fill="#131210" stroke="#E5533B" stroke-width="1.5" rx="4"/>
  <rect x="80" y="565" width="560" height="26" fill="#E5533B" fill-opacity="0.15" stroke="none"/>
  <text x="360" y="583" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#E5533B" text-anchor="middle" font-weight="700">Phase 3 — High-noise active · selective</text>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#D9DCCF" text-anchor="middle">
    <text x="360" y="613">Nmap -sV -sC on selected hosts</text>
    <text x="360" y="635">Full range on interesting hosts</text>
    <text x="360" y="657">ffuf raft-medium + extensions</text>
  </g>

  <!-- Phase 3 → Rank -->
  <line x1="360" y1="670" x2="360" y2="688" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rank -->
  <rect x="240" y="690" width="240" height="34" fill="#131210" stroke="#D9DCCF" stroke-width="1.5" rx="3"/>
  <text x="360" y="712" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#F2F4EA" text-anchor="middle">Rank services by attack value</text>

  <!-- Rank → Downstream -->
  <line x1="360" y1="724" x2="360" y2="742" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Downstream -->
  <rect x="180" y="744" width="360" height="34" fill="#131210" stroke="#D9DCCF" stroke-width="1.5" rx="3"/>
  <text x="360" y="766" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#F2F4EA" text-anchor="middle">Downstream: vuln probing · credential targeting</text>

  <!-- Legend -->
  <g transform="translate(80 800)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#8F8875" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="38" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#D9DCCF">sequential main flow</text>
    <line x1="230" y1="0" x2="258" y2="0" stroke="#615C50" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dim)"/>
    <text x="268" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#D9DCCF">short-circuit / skip path</text>
  </g>
</svg>
