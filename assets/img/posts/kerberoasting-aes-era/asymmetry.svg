<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" role="img" aria-labelledby="asym-title" preserveAspectRatio="xMidYMid meet">
  <title id="asym-title">The asymmetry of Kerberoasting: attacker needs one win, defender must cover all</title>

  <defs>
    <marker id="k-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8F8875"/>
    </marker>
    <marker id="k-arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E5533B"/>
    </marker>
  </defs>

  <!-- Attacker node -->
  <ellipse cx="120" cy="240" rx="70" ry="26" fill="#131210" stroke="#E5533B" stroke-width="1.8"/>
  <text x="120" y="238" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#E5533B" text-anchor="middle" font-weight="700">Attacker</text>
  <text x="120" y="253" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#D9DCCF" text-anchor="middle">any domain user</text>

  <!-- SPN account boxes (5 targets) -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">
    <!-- svc-sql (weak) - the winning path -->
    <rect x="360" y="60" width="220" height="44" fill="#131210" stroke="#E5533B" stroke-width="1.8" rx="3"/>
    <text x="470" y="80" fill="#F2F4EA" text-anchor="middle" font-weight="700">svc-sql · SPN set</text>
    <text x="470" y="95" fill="#E5533B" text-anchor="middle">pwd: 5yr old, 9 chars — WEAK</text>

    <rect x="360" y="118" width="220" height="40" fill="#131210" stroke="#48B44A" stroke-width="1.3" rx="3"/>
    <text x="470" y="136" fill="#D9DCCF" text-anchor="middle">svc-web · SPN set</text>
    <text x="470" y="150" fill="#48B44A" text-anchor="middle">gMSA · 256-byte random</text>

    <rect x="360" y="172" width="220" height="40" fill="#131210" stroke="#48B44A" stroke-width="1.3" rx="3"/>
    <text x="470" y="190" fill="#D9DCCF" text-anchor="middle">svc-backup · SPN set</text>
    <text x="470" y="204" fill="#48B44A" text-anchor="middle">28-char passphrase</text>

    <rect x="360" y="226" width="220" height="40" fill="#131210" stroke="#48B44A" stroke-width="1.3" rx="3"/>
    <text x="470" y="244" fill="#D9DCCF" text-anchor="middle">svc-app · SPN set</text>
    <text x="470" y="258" fill="#48B44A" text-anchor="middle">gMSA · rotated 30d</text>

    <!-- targetedKerberoast path -->
    <rect x="360" y="290" width="220" height="44" fill="#131210" stroke="#E5A03B" stroke-width="1.5" rx="3"/>
    <text x="470" y="310" fill="#F2F4EA" text-anchor="middle" font-weight="700">user-hr · no SPN</text>
    <text x="470" y="325" fill="#E5A03B" text-anchor="middle">writable → add SPN (targeted)</text>
  </g>

  <!-- Arrows attacker → targets -->
  <g stroke="#8F8875" stroke-width="1.3" fill="none">
    <path d="M 185 228 C 260 150, 300 110, 358 92" marker-end="url(#k-arrow)"/>
    <path d="M 190 235 C 270 190, 300 160, 358 140" marker-end="url(#k-arrow)"/>
    <path d="M 190 242 C 280 220, 310 200, 358 192" marker-end="url(#k-arrow)"/>
    <path d="M 190 248 C 280 250, 310 250, 358 246" marker-end="url(#k-arrow)"/>
  </g>
  <!-- targeted path (amber, thicker) -->
  <path d="M 185 252 C 270 300, 310 310, 358 312" stroke="#E5A03B" stroke-width="1.5" fill="none" marker-end="url(#k-arrow)"/>

  <!-- Winning path highlight (red, thick) -->
  <path d="M 185 226 C 265 145, 300 105, 358 88" stroke="#E5533B" stroke-width="2.5" fill="none" marker-end="url(#k-arrow-red)"/>

  <!-- Result -->
  <rect x="360" y="380" width="300" height="60" fill="#131210" stroke="#E5533B" stroke-width="1.8" rx="4"/>
  <text x="510" y="404" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#E5533B" text-anchor="middle" font-weight="700">One weak account = domain compromise</text>
  <text x="510" y="422" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#D9DCCF" text-anchor="middle">Attacker needs 1 win · Defender must cover all</text>

  <!-- svc-sql → result arrow -->
  <path d="M 470 104 C 620 200, 660 300, 600 378" stroke="#E5533B" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#k-arrow-red)"/>

  <!-- Labels -->
  <text x="120" y="300" font-family="Zen Kaku Gothic New, sans-serif" font-size="10" fill="#8F8875" text-anchor="middle">requests TGS for</text>
  <text x="120" y="314" font-family="Zen Kaku Gothic New, sans-serif" font-size="10" fill="#8F8875" text-anchor="middle">every SPN (normal traffic)</text>
</svg>
