---
layout: default
---

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

.dome-home{
  --bg:#0B0B0C;
  --ph-hi:#F2F4EA;
  --ph:#D9DCCF;
  --ph-dim:#8F8875;
  --grn:#48B44A;
  --rule:rgba(217,220,207,.15);
  --card:rgba(217,220,207,.04);
  --card-hi:rgba(217,220,207,.07);

  position:relative;
  margin:-.5rem 0 0;
  padding:clamp(2rem,5vw,3.2rem) clamp(1.2rem,4vw,2.4rem) 1rem;
  background-color:transparent;
  
  
  border:0;
  align-self:start;
}
.dome-home__page{position:relative;max-width:52rem;padding-left:1.6rem;}
.dome-home__page::before{
  content:"";position:absolute;left:.35rem;top:.1rem;bottom:.1rem;
  width:1px;background:var(--ph-dim);opacity:.6;
}

.dome-home .dh-prompt{
  font-family:'JetBrains Mono',monospace;color:var(--ph-dim);
  font-size:.85rem;letter-spacing:.01em;margin:0 0 1.5rem;
}
.dome-home .dh-prompt b{color:var(--ph-hi);font-weight:700;}
.dome-home .dh-prompt .cur{
  display:inline-block;width:.55ch;height:1em;background:var(--grn);
  margin-left:.2rem;vertical-align:-.12em;animation:dh-blink 1.1s steps(1) infinite;
}
@keyframes dh-blink{50%{opacity:0;}}

.dome-home .dh-intro{margin:0;}
.dome-home .dh-intro .jp{
  font-family:'Zen Kaku Gothic New',sans-serif;font-weight:500;
  font-size:clamp(1.4rem,3.6vw,2rem);line-height:1.55;
  color:var(--ph-hi);margin:0 0 .6rem;
}
.dome-home .dh-intro .en{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.84rem,1.9vw,.98rem);line-height:1.55;
  color:var(--ph);margin:0;
}

.dome-home .dh-domains{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:2.3rem 0 0;
}
.dome-home .dh-card{
  position:relative;display:flex;flex-direction:column;gap:.15rem;overflow:hidden;
  padding:1.2rem 1.2rem 1.15rem;
  background:var(--card);border:0;
  border-left:2px solid var(--ph-dim);border-radius:2px;text-decoration:none;
  transition:transform .16s ease,border-color .16s ease,background .16s ease;
}
.dome-home .dh-card .glyph{
  position:absolute;right:.35rem;bottom:-.55rem;
  font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;
  font-size:4.6rem;line-height:1;color:rgba(217,220,207,.06);
  pointer-events:none;transition:color .16s ease;
}
.dome-home .dh-card .label{
  font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:1.04rem;letter-spacing:.02em;color:var(--ph-hi);
}
.dome-home .dh-card .sub{
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:.83rem;color:var(--ph-dim);
}
.dome-home .dh-card:hover{
  transform:translateY(-2px);background:var(--card-hi);
  border-color:var(--ph-dim);border-left-color:var(--grn);
}
.dome-home .dh-card:hover .glyph{color:rgba(217,220,207,.13);}
.dome-home .dh-card:focus-visible{outline:2px solid var(--grn);outline-offset:2px;}

.dome-home .dh-links{
  display:flex;flex-wrap:wrap;gap:1.7rem;margin:2.3rem 0 0;
  font-family:'JetBrains Mono',monospace;
}
.dome-home .dh-links a{
  color:var(--ph);text-decoration:none;font-size:.95rem;
  border-bottom:1px solid transparent;padding-bottom:2px;transition:color .16s,border-color .16s;
}
.dome-home .dh-links a:hover{color:var(--ph-hi);border-bottom-color:var(--grn);}
.dome-home .dh-links a:focus-visible{outline:2px solid var(--grn);outline-offset:3px;}

.dome-home .dh-motto{margin:1.8rem 0 0;}
.dome-home .dh-motto hr{display:none;}
.dome-home .dh-motto blockquote{
  margin:0;padding:0;border:0;background:none;
  color:var(--ph-dim);font-size:.8rem;line-height:1.5;opacity:.7;
  font-family:'Zen Kaku Gothic New',sans-serif;
}

.dome-home__page>*{animation:dh-rise .5s ease both;}
.dome-home .dh-prompt{animation-delay:.02s;}
.dome-home .dh-intro{animation-delay:.08s;}
.dome-home .dh-domains{animation-delay:.16s;}
.dome-home .dh-links{animation-delay:.24s;}
.dome-home .dh-motto{animation-delay:.30s;}
@keyframes dh-rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

@media (max-width:620px){
  .dome-home .dh-domains{grid-template-columns:1fr;}
  .dome-home__page{padding-left:1.1rem;}
}
@media (prefers-reduced-motion:reduce){
  .dome-home__page>*,.dome-home .dh-prompt .cur{animation:none;}
}
</style>

<div class="dome-home">
  <div class="dome-home__page">

    <p class="dh-prompt"><b>d0me</b>:~$ cat intro<span class="cur"></span></p>

    <header class="dh-intro">
      <p class="jp">攻撃と防御、双方の視点で書き留めた実務ノート。</p>
      <p class="en">Notes from both sides of security — offensive and defensive.</p>
    </header>

    <nav class="dh-domains" aria-label="domains">
      <a class="dh-card" href="{{ '/refs/' | relative_url }}">
        <span class="glyph" aria-hidden="true">攻</span>
        <span class="label">Offensive</span>
        <span class="sub">攻撃</span>
      </a>
      <a class="dh-card" href="{{ '/refs/' | relative_url }}">
        <span class="glyph" aria-hidden="true">守</span>
        <span class="label">Defensive</span>
        <span class="sub">防御</span>
      </a>
      <a class="dh-card" href="{{ '/refs/' | relative_url }}">
        <span class="glyph" aria-hidden="true">雑</span>
        <span class="label">Other</span>
        <span class="sub">その他</span>
      </a>
    </nav>

    <div class="dh-links">
      <a href="{{ '/posts/' | relative_url }}">→ Posts</a>
      <a href="{{ '/refs/' | relative_url }}">→ Refs</a>
    </div>

    <footer class="dh-motto">
      <blockquote>我以外皆我師 — everyone I meet has something to teach me.</blockquote>
    </footer>

  </div>
</div>
